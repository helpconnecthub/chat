<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>United States Support Group</title>  
<style>  
  * { margin: 0; padding: 0; box-sizing: border-box; }  

  body {  
    font-family: 'Segoe UI', sans-serif;  
    background: #f0f2f5;  
    min-height: 100vh;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
  }  

  .card {  
    background: #fff;  
    border-radius: 24px;  
    max-width: 420px;  
    width: 95%;  
    margin: 20px auto;  
    padding: 36px 28px 28px;  
    text-align: center;  
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);  
  }  

  /* WhatsApp Icon */  
  .wa-icon {  
    width: 80px;  
    height: 80px;  
    background: linear-gradient(145deg, #25D366, #128C7E);  
    border-radius: 22px;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    margin: 0 auto 20px;  
    box-shadow: 0 6px 20px rgba(37,211,102,0.4);  
  }  
  .wa-icon svg { width: 48px; height: 48px; fill: white; }  

  /* Title */  
  h1 {  
    font-size: 1.45rem;  
    font-weight: 800;  
    color: #111;  
    line-height: 1.35;  
    margin-bottom: 22px;  
  }  

  /* Ticker */  
  .ticker-wrap {  
    background: #e8faf0;  
    border: 1.5px solid #b2dfcb;  
    border-radius: 14px;  
    padding: 13px 18px;  
    margin-bottom: 18px;  
    overflow: hidden;  
    min-height: 48px;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
  }  
  .ticker-text {  
    font-size: 0.97rem;  
    font-weight: 700;  
    color: #1a7a40;  
    animation: fadeSlide 0.5s ease;  
  }  
  @keyframes fadeSlide {  
    from { opacity: 0; transform: translateY(10px); }  
    to   { opacity: 1; transform: translateY(0); }  
  }  

  /* Online */  
  .online-row {  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    gap: 6px;  
    margin-bottom: 14px;  
  }  
  .online-dot { width: 10px; height: 10px; background: #25D366; border-radius: 50%; animation: pulse 1.5s infinite; }  
  @keyframes pulse {  
    0%,100% { transform: scale(1); opacity: 1; }  
    50% { transform: scale(1.3); opacity: 0.7; }  
  }  
  .online-label { font-size: 0.82rem; font-weight: 700; color: #25D366; letter-spacing: 1.5px; text-transform: uppercase; }  

  /* Avatars */  
  .avatars {  
    display: flex;  
    justify-content: center;  
    gap: 10px;  
    margin-bottom: 22px;  
  }  
  .avatar {  
    width: 58px; height: 58px;  
    border-radius: 50%;  
    border: 3px solid #25D366;  
    object-fit: cover;  
    overflow: hidden;  
    background: #ddd;  
  }  
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }  

  /* Gender */  
  .gender-label {  
    font-size: 1rem;  
    font-weight: 600;  
    color: #444;  
    margin-bottom: 14px;  
  }  
  .gender-row {  
    display: flex;  
    gap: 12px;  
    justify-content: center;  
    margin-bottom: 26px;  
  }  
  .gender-btn {  
    flex: 1;  
    max-width: 150px;  
    padding: 13px 0;  
    border-radius: 14px;  
    border: 2px solid #e0e0e0;  
    background: #f5f5f5;  
    font-size: 1rem;  
    font-weight: 700;  
    color: #333;  
    cursor: pointer;  
    transition: all 0.2s;  
  }  
  .gender-btn.active, .gender-btn:hover {  
    background: #fff;  
    border-color: #25D366;  
    color: #25D366;  
  }  

  /* Buttons */  
  .btn-chat {  
    display: block;  
    width: 100%;  
    padding: 16px;  
    background: linear-gradient(135deg, #25D366, #128C7E);  
    color: white;  
    font-size: 1.05rem;  
    font-weight: 800;  
    letter-spacing: 1.5px;  
    text-transform: uppercase;  
    border: none;  
    border-radius: 16px;  
    cursor: pointer;  
    text-decoration: none;  
    margin-bottom: 12px;  
    box-shadow: 0 4px 16px rgba(37,211,102,0.35);  
    transition: transform 0.15s, box-shadow 0.15s;  
  }  
  .btn-chat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,0.4); }  

  .btn-join {  
    display: block;  
    width: 100%;  
    padding: 16px;  
    background: #1a2640;  
    color: white;  
    font-size: 1.05rem;  
    font-weight: 800;  
    letter-spacing: 1.5px;  
    text-transform: uppercase;  
    border: none;  
    border-radius: 16px;  
    cursor: pointer;  
    text-decoration: none;  
    margin-bottom: 24px;  
    transition: background 0.2s;  
  }  
  .btn-join:hover { background: #243352; }  

  /* Footer */  
  .footer { font-size: 0.78rem; color: #aaa; }  
  .footer a { color: #25D366; text-decoration: none; }  


</style>  
</head>  
<body>  
<div class="card">  

  <!-- WhatsApp Icon -->  
  <div class="wa-icon">  
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">  
      <path d="M16 2C8.268 2 2 8.268 2 16c0 2.52.664 4.886 1.827 6.934L2 30l7.294-1.804A13.94 13.94 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.5a11.45 11.45 0 0 1-5.82-1.586l-.418-.248-4.33 1.072 1.095-4.22-.272-.434A11.468 11.468 0 0 1 4.5 16C4.5 9.648 9.648 4.5 16 4.5S27.5 9.648 27.5 16 22.352 27.5 16 27.5zm6.29-8.617c-.344-.172-2.036-1.004-2.352-1.118-.316-.115-.546-.172-.776.172-.23.345-.89 1.118-1.09 1.348-.2.23-.4.258-.744.086-.344-.172-1.452-.535-2.766-1.706-1.022-.912-1.712-2.04-1.912-2.384-.2-.345-.021-.531.15-.702.154-.154.344-.4.516-.6.172-.2.23-.345.345-.574.115-.23.057-.43-.028-.602-.086-.172-.776-1.87-1.063-2.56-.28-.672-.564-.58-.776-.59-.2-.01-.43-.012-.66-.012s-.602.086-.917.43c-.315.345-1.204 1.177-1.204 2.87s1.232 3.33 1.404 3.56c.172.23 2.425 3.704 5.875 5.193.82.354 1.46.566 1.96.724.823.262 1.572.225 2.164.137.66-.098 2.036-.832 2.323-1.636.287-.804.287-1.492.2-1.636-.086-.144-.315-.23-.659-.4z"/>  
    </svg>  
  </div>  

  <!-- Title -->  
  <h1>United States Support group.<br>Chat Now to Receive your own</h1>  

  <!-- Ticker -->  
  <div class="ticker-wrap">  
    <span class="ticker-text" id="ticker">mary just got paid to EcoCash $350</span>  
  </div>  

  <!-- Online -->  
  <div class="online-row">  
    <span class="online-dot"></span>  
    <span class="online-label">Online Now</span>  
  </div>  

  <!-- Avatars -->  
  <div class="avatars">  
    <div class="avatar"><img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user"></div>  
    <div class="avatar"><img src="https://randomuser.me/api/portraits/women/44.jpg" alt="user"></div>  
    <div class="avatar"><img src="https://randomuser.me/api/portraits/men/75.jpg" alt="user"></div>  
    <div class="avatar"><img src="https://randomuser.me/api/portraits/women/68.jpg" alt="user"></div>  
  </div>  

  <!-- Gender -->  
  <p class="gender-label">Are you Male or Female?</p>  
  <div class="gender-row">  
    <button class="gender-btn" onclick="selectGender(this)">Male</button>  
    <button class="gender-btn active" onclick="selectGender(this)">Female</button>  
  </div>  

  <!-- Buttons -->  
  <a href="#" id="chatBtn" class="btn-chat">🚀 Start Chatting</a>  
  <a href="#" id="joinBtn" class="btn-join">💬 Join WhatsApp Group</a>  

  <div class="footer">© 2026 <strong>Chat &amp; Get Paid</strong> &nbsp;|&nbsp; <a href="https://blog.val9janews.com/privacy-policy/" target="_blank">Privacy Policy</a></div>  
</div>  

<script>  
  // ─── Ticker ───────────────────────────────────────────────  
  const names   = ["Mary","James","Linda","Robert","Susan","David","Karen","Michael","Emily","Daniel","Olivia","Chris","Sophia","Brian","Jessica","Kevin"];  
  const methods = ["EcoCash","PayPal","Cash App","Venmo","Zelle","MoMo"];  

  function randomAmount() {  
    const amounts = [100,120,150,175,200,225,250,275,300,325,350,375,400,425,450,475,500];  
    return amounts[Math.floor(Math.random() * amounts.length)];  
  }  

  function updateTicker() {  
    const el   = document.getElementById("ticker");  
    const name = names[Math.floor(Math.random() * names.length)];  
    const mtd  = methods[Math.floor(Math.random() * methods.length)];  
    const amt  = randomAmount();  
    el.style.animation = "none";  
    el.offsetHeight;  
    el.style.animation = "fadeSlide 0.5s ease";  
    el.textContent = `${name} just got paid to ${mtd} $${amt}`;  
  }  
  setInterval(updateTicker, 3000);  

  // ─── Gender toggle ────────────────────────────────────────  
  function selectGender(btn) {  
    document.querySelectorAll(".gender-btn").forEach(b => b.classList.remove("active"));  
    btn.classList.add("active");  
  }  
</script>  
</body>  
</html>
